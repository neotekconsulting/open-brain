services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-openbrain}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    restart: unless-stopped

  mcp-brain:
    build:
      context: ./mcp-brain
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OLLAMA_URL: http://ollama:${OLLAMA_PORT:-11434}
      MCP_PORT: ${MCP_PORT:-8000}
    ports:
      - "${MCP_PORT:-8000}:${MCP_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ingestion-api:
    build:
      context: ./ingestion-api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OLLAMA_URL: http://ollama:${OLLAMA_PORT:-11434}
      INGESTION_PORT: ${INGESTION_PORT:-8080}
    ports:
      - "${INGESTION_PORT:-8080}:${INGESTION_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  ollama:
