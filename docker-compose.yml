services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-openbrain}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: 0.0.0.0
    volumes:
      - ollama:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    restart: unless-stopped

  # One-shot: wait for the Ollama server, then pull the models the stack needs.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - /bin/sh
      - -c
      - >-
        until ollama list >/dev/null 2>&1; do
          echo 'waiting for ollama server...'; sleep 2;
        done;
        echo 'pulling models...';
        ollama pull nomic-embed-text &&
        ollama pull llama3.2
    restart: "no"

  mcp-brain:
    build:
      context: ./mcp-brain
      dockerfile: Dockerfile
    command: ["python", "server.py", "http"]
    env_file:
      - .env
    environment:
      OLLAMA_HOST: ollama
      OLLAMA_PORT: ${OLLAMA_PORT:-11434}
      OLLAMA_URL: http://ollama:11434
      DATABASE_URL: postgres://${POSTGRES_USER:-openbrain}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-openbrain}
      MCP_PORT: ${MCP_PORT:-8000}
    ports:
      - "${MCP_PORT:-8000}:${MCP_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped

  ingestion-api:
    build:
      context: ./ingestion-api
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      OLLAMA_HOST: ollama
      OLLAMA_PORT: ${OLLAMA_PORT:-11434}
      OLLAMA_URL: http://ollama:11434
      DATABASE_URL: postgres://${POSTGRES_USER:-openbrain}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-openbrain}
      INGESTION_PORT: ${INGESTION_PORT:-8080}
    ports:
      - "${INGESTION_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
  ollama:
