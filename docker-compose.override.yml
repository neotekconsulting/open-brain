services:
  mcp-brain:
    build:
      context: ./mcp-brain
      dockerfile: Dockerfile
    volumes:
      - ./mcp-brain:/app:cached
    ports:
      - "${MCP_DEBUG_PORT:-8001}:${MCP_PORT:-8000}"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OLLAMA_URL=${OLLAMA_URL}
      - MCP_PORT=${MCP_PORT}
    healthcheck:
      test: ["CMD-SHELL", "echo ok || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 0s
    restart: unless-stopped

  ingestion-api:
    build:
      context: ./ingestion-api
      dockerfile: Dockerfile
    volumes:
      - ./ingestion-api:/app:cached
    ports:
      - "${INGESTION_API_DEBUG_PORT:-8081}:${INGESTION_PORT:-8080}"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OLLAMA_URL=${OLLAMA_URL}
      - INGESTION_PORT=${INGESTION_PORT}
    healthcheck:
      test: ["CMD-SHELL", "echo ok || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 0s
    restart: unless-stopped
