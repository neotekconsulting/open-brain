services:
  mcp-brain:
    build:
      context: ./mcp-brain
      dockerfile: Dockerfile
    volumes:
      - ./mcp-brain:/app:cached
    ports:
      - "${MCP_DEBUG_PORT:-8001}:${MCP_PORT:-8000}"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=${OLLAMA_PORT:-11434}
      - MCP_PORT=${MCP_PORT:-8000}
    healthcheck:
      test: ["CMD-SHELL", "echo ok || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 0s
    restart: unless-stopped

  ingestion-api:
    build:
      context: ./ingestion-api
      dockerfile: Dockerfile
    volumes:
      - ./ingestion-api:/app:cached
    ports:
      - "${INGESTION_API_DEBUG_PORT:-8081}:${INGESTION_PORT:-8080}"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=${OLLAMA_PORT:-11434}
      - INGESTION_PORT=${INGESTION_PORT:-8080}
    healthcheck:
      test: ["CMD-SHELL", "echo ok || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 0s
    restart: unless-stopped
